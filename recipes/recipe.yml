# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
version: 1
name: meza-niri-dev
description: MezaOS niri Wayland workstation — tiling compositor, material shell, dev tools.
base-image: ghcr.io/ublue-os/bluefin-dx
image-version: 44

modules:
  - type: signing

  - type: dnf
    repos:
      files:
        - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
    install:
      packages:
        - niri
        - sddm
        - fish
        - nautilus
        - DankMaterialShell
        - repo: terra
          packages:
            - ghostty
            - zed

  - type: systemd
    system:
      enabled:
        - sddm.service
      disabled:
        - gdm.service
