# TEMPLATE: harness/templates/recipe.yml.skel
# V1 → V2 migration: top-level version: 2 added; v1 fields moved to
# metadata.* / base.image.*. Placeholders: SPIN_NAME, BASE_IMAGE,
# IMAGE_VERSION, DESCRIPTION (4 v1-equivalent; the LLM fills these
# from the new-spin interview). Do not add new opt-in placeholders
# (KERNEL_MODE, HOMED_MODE, NIX_MODE) here — they belong to slices
# 2-4 of mezaos-harness-extensions, not to the v2 migration slice.
# After filling, the result MUST pass
# `harness/skills/validate-recipe/scripts/check.sh`.
---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v2.json
version: 2

metadata:
  name: meza-niri-dev
  description: MezaOS niri Wayland workstation — tiling compositor, material shell, dev tools.
  labels: {}

base:
  image:
    repository: ghcr.io/ublue-os/bluefin-dx
    tag: "44"  # quoted — YAML int vs string matters for jsonschema
  public-key: cosign.pub-placeholder  # placeholder; cosign-init writes a real one at apply time

spec:
  tags: []
  platforms: []
  tool-versions:
    bluebuild: ">= 1.0.0"
    cosign: ">= 2.4.0"
    nushell: ">= 0.100.0"

# Opt-in fragments (filled in by the new-spin flow in slice 5;
# this slice only ships the v2 migration of the 4 v1 placeholders):
#   10-kernel-cachyos.yml   (only if kernel mode == cachyos)
#   20-kernel-nvidia.yml    (only if kernel mode == nvidia)
#   30-homed.yml            (only if homed mode == yes)
#   40-nix.yml              (only if nix mode == yes)
modules:
  # TEMPLATE: replace this placeholder module with the LLM's scaffold output
  # (signing + dnf install + optional default-flatpaks). Do not commit this
  # file unchanged — `validate-recipe` will reject empty `modules: []`.
  - type: signing
    keyless: true

  - type: dnf
    repos:
      files:
        - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
    install:
      packages:
        - niri
        - sddm
        - fish
        - nautilus
        - DankMaterialShell
        - repo: terra
          packages:
            - ghostty
            - zed

  - type: systemd
    system:
      enabled:
        - sddm.service
      disabled:
        - gdm.service
